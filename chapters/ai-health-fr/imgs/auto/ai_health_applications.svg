  <text x="327" y="358" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#1a4f1a" id="t6a">Analyse génomique</text>
  <text x="327" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#1a4f1a" id="t6b">Prédiction de risques</text>
  <text x="327" y="386" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#1a4f1a" id="t6c">Traitement personnalisé</text>
  <text x="327" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#1a4f1a" id="t6d">Pharmacogénomique</text>
