  <text x="557" y="348" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#1a4f1a" id="t5a">Planning du personnel</text>
  <text x="557" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#1a4f1a" id="t5b">Gestion des blocs opératoires</text>
