  <text x="107" y="348" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#1a4f1a" id="t7a">Surveillance des épidémies</text>
  <text x="107" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#1a4f1a" id="t7b">Prédiction de propagation</text>
  <text x="107" y="376" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#1a4f1a" id="t7c">Analyse des signaux faibles</text>
  <text x="107" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#1a4f1a" id="t7d">COVID-19 : modèles SIR+IA</text>
