  <rect x="20" y="20" width="175" height="90" rx="10" fill="#e8f0fb" stroke="#1a3c6e" stroke-width="1.5" id="r1"/>
  <rect x="20" y="20" width="175" height="24" rx="10" fill="#1a3c6e" id="r1h"/>
  <rect x="20" y="34" width="175" height="10" fill="#1a3c6e" id="r1h2"/>
  <text x="107" y="37" text-anchor="middle" font-family="Georgia, serif" font-size="11px" font-weight="bold" fill="#ffffff" id="t1h">Imagerie Médicale</text>
