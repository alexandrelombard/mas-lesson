  <rect x="20" y="310" width="175" height="90" rx="10" fill="#eaf5ea" stroke="#2a7a2a" stroke-width="1.5" id="r7"/>
  <rect x="20" y="310" width="175" height="24" rx="10" fill="#2a7a2a" id="r7h"/>
  <rect x="20" y="324" width="175" height="10" fill="#2a7a2a" id="r7h2"/>
