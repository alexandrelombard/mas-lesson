<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 820 360"
   width="820"
   height="360"
   version="1.1"
   id="svg_challenges"
   sodipodi:docname="ai_health_challenges.svg"
   inkscape:version="1.4.3"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg">
  <sodipodi:namedview id="namedview1" pagecolor="#ffffff" bordercolor="#666666"
     borderopacity="1.0" inkscape:showpageshadow="2" inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0" inkscape:deskcolor="#d1d1d1" showgrid="false"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="16px" font-weight="bold" fill="#1a3c6e" id="title">Défis de l'IA en Santé</text>

  <!-- Row 1: 3 challenges -->
  <!-- Challenge 1: Niveau de preuve -->
  <rect x="20" y="50" width="240" height="120" rx="10" fill="#fff3f3" stroke="#c0392b" stroke-width="1.5" id="c1_bg"/>
  <rect x="20" y="50" width="240" height="28" rx="10" fill="#c0392b" id="c1_head"/>
  <rect x="20" y="64" width="240" height="14" fill="#c0392b" id="c1_head2"/>
  <text x="140" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="12px" font-weight="bold" fill="#ffffff" id="c1_title">⚠ Niveau de Preuve</text>
  <text x="140" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c1_t1">Peu d'essais cliniques randomisés</text>
  <text x="140" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c1_t2">Résultats in vitro ≠ pratique clinique</text>
  <text x="140" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c1_t3">Publication bias : études négatives</text>
  <text x="140" y="144" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c1_t4">rarement publiées</text>
  <text x="140" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c1_t5">→ Validation clinique indispensable</text>

  <!-- Challenge 2: Biais algorithmiques -->
  <rect x="290" y="50" width="240" height="120" rx="10" fill="#fff3f3" stroke="#c0392b" stroke-width="1.5" id="c2_bg"/>
  <rect x="290" y="50" width="240" height="28" rx="10" fill="#c0392b" id="c2_head"/>
  <rect x="290" y="64" width="240" height="14" fill="#c0392b" id="c2_head2"/>
  <text x="410" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="12px" font-weight="bold" fill="#ffffff" id="c2_title">⚠ Biais Algorithmiques</text>
  <text x="410" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c2_t1">Données d'entraînement biaisées</text>
  <text x="410" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c2_t2">Sous-représentation : femmes, âgés,</text>
  <text x="410" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c2_t3">minorités ethniques</text>
  <text x="410" y="144" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c2_t4">Risque de discrimination</text>
  <text x="410" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c2_t5">→ Données diversifiées requises</text>

  <!-- Challenge 3: Explicabilité -->
  <rect x="560" y="50" width="240" height="120" rx="10" fill="#fff3f3" stroke="#c0392b" stroke-width="1.5" id="c3_bg"/>
  <rect x="560" y="50" width="240" height="28" rx="10" fill="#c0392b" id="c3_head"/>
  <rect x="560" y="64" width="240" height="14" fill="#c0392b" id="c3_head2"/>
  <text x="680" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="12px" font-weight="bold" fill="#ffffff" id="c3_title">⚠ Explicabilité (XAI)</text>
  <text x="680" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c3_t1">Modèles « boîte noire »</text>
  <text x="680" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c3_t2">Le clinicien doit comprendre</text>
  <text x="680" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c3_t3">la décision pour l'assumer</text>
  <text x="680" y="144" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c3_t4">EU AI Act : exigence légale</text>
  <text x="680" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a1010" id="c3_t5">→ IA hybride / neuro-symbolique</text>

  <!-- Row 2: 3 challenges -->
  <!-- Challenge 4: Hallucinations -->
  <rect x="20" y="195" width="240" height="120" rx="10" fill="#fff8e8" stroke="#e08000" stroke-width="1.5" id="c4_bg"/>
  <rect x="20" y="195" width="240" height="28" rx="10" fill="#e08000" id="c4_head"/>
  <rect x="20" y="209" width="240" height="14" fill="#e08000" id="c4_head2"/>
  <text x="140" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="12px" font-weight="bold" fill="#ffffff" id="c4_title">⚠ Hallucinations LLM</text>
  <text x="140" y="241" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c4_t1">Informations médicales fausses</text>
  <text x="140" y="257" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c4_t2">mais plausibles et confiantes</text>
  <text x="140" y="273" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c4_t3">Risque vital en contexte clinique</text>
  <text x="140" y="289" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c4_t4">RAG + bases médicales certifiées</text>
  <text x="140" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c4_t5">→ Supervision humaine obligatoire</text>

  <!-- Challenge 5: Responsabilité -->
  <rect x="290" y="195" width="240" height="120" rx="10" fill="#fff8e8" stroke="#e08000" stroke-width="1.5" id="c5_bg"/>
  <rect x="290" y="195" width="240" height="28" rx="10" fill="#e08000" id="c5_head"/>
  <rect x="290" y="209" width="240" height="14" fill="#e08000" id="c5_head2"/>
  <text x="410" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="12px" font-weight="bold" fill="#ffffff" id="c5_title">⚠ Responsabilité Légale</text>
  <text x="410" y="241" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c5_t1">En cas d'erreur : médecin,</text>
  <text x="410" y="257" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c5_t2">éditeur ou établissement ?</text>
  <text x="410" y="273" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c5_t3">Assurance, certification CE/FDA</text>
  <text x="410" y="289" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c5_t4">Dispositif médical (MDR 2017/745)</text>
  <text x="410" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c5_t5">→ Cadre juridique en construction</text>

  <!-- Challenge 6: Confidentialité -->
  <rect x="560" y="195" width="240" height="120" rx="10" fill="#fff8e8" stroke="#e08000" stroke-width="1.5" id="c6_bg"/>
  <rect x="560" y="195" width="240" height="28" rx="10" fill="#e08000" id="c6_head"/>
  <rect x="560" y="209" width="240" height="14" fill="#e08000" id="c6_head2"/>
  <text x="680" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="12px" font-weight="bold" fill="#ffffff" id="c6_title">⚠ Confidentialité</text>
  <text x="680" y="241" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c6_t1">Données de santé = art. 9 RGPD</text>
  <text x="680" y="257" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c6_t2">Certification HDS obligatoire</text>
  <text x="680" y="273" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c6_t3">CLOUD Act : risque souveraineté</text>
  <text x="680" y="289" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c6_t4">Ré-identification possible</text>
  <text x="680" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="9.5px" fill="#7a4000" id="c6_t5">→ Hébergement souverain (HDS)</text>

  <!-- credit -->
  <text x="410" y="350" text-anchor="middle"
     style="font-size:8px;font-family:Arial;fill:#888888"
     id="credit">[Généré avec Claude Sonnet 4.6]</text>
</svg>
